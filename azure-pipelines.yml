trigger:
  branches:
    include:
    - main
parameters:
- name: users
  displayName: Users
  type: number
  default: 10
- name: rampUp
  displayName: Ramp-up (seconds)
  type: number
  default: 5
- name: loop
  displayName: Loop count
  type: number
  default: 2
- name: groupToRun
  displayName: JMeter thread group to run
  type: string
  default: 01_Policy_Admin
- name: logRequestResponse
  displayName: Registrar request/response en http-request-response.log.txt
  type: boolean
  default: false
- name: logRequestResponseFailuresOnly
  displayName: Solo fallidos en el log (si está activado el log HTTP)
  type: boolean
  default: true
- name: maxErrorPercent
  displayName: Límite % error permitido (si no hay override para el grupo)
  type: number
  default: 5
- name: errorLimitOverridesJson
  displayName: Overrides límite % error por groupToRun (JSON, ej. {"01_Policy_Admin":1,"01_Claims":3})
  type: string
  default: '{}'
stages:
- stage: __default
  jobs:
  - job: Job
    pool:
      vmImage: 'windows-latest'
    steps:
    - task: JMeterInstaller@0
      inputs:
        jmeterVersion: '5.6.3'
    - task: PowerShell@2
      displayName: 'Verificar conectividad OAuth'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "=== Test conectividad OAuth ==="
          try {
            $r = Invoke-WebRequest -Uri 'https://sales.v1130.policysense.solutions/oauth/v2/token' `
              -Method POST `
              -Body 'grant_type=password&username=MxAdmin&password=Admin_123&client_id=policysense' `
              -ContentType 'application/x-www-form-urlencoded' `
              -UseBasicParsing -TimeoutSec 15 -ErrorAction Stop
            Write-Host "HTTP $($r.StatusCode) - OAuth OK"
            Write-Host $r.Content.Substring(0, [Math]::Min(200, $r.Content.Length))
          } catch {
            Write-Host "##vso[task.logissue type=warning]OAuth fallo: $($_.Exception.Message)"
            Write-Host "Posible causa: el agente no tiene acceso a la red QA de Policysense"
          }
    - task: PowerShell@2
      displayName: 'Ejecutar JMeter'
      env:
        JMETER_LOG_HTTP: False
        JMETER_LOG_FAIL_ONLY: True
      inputs:
        targetType: 'inline'
        script: >
          $testPlan = "Policysense.jmx";

          Write-Host "Params: users=${{ parameters.users }} rampUp=${{ parameters.rampUp }} loop=${{ parameters.loop }} groupToRun=${{ parameters.groupToRun }}";

          $jmeterBat = Get-ChildItem -Path $env:AGENT_TOOLSDIRECTORY -Recurse -Filter 'jmeter.bat' -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName;

          if (-not $jmeterBat) { Write-Host "##vso[task.logissue type=error]No se encontro jmeter.bat"; exit 1 };

          Write-Host "JMeter encontrado: $jmeterBat";

          New-Item -ItemType Directory -Force -Path 'report' | Out-Null;

          New-Item -ItemType Directory -Force -Path 'results' | Out-Null;

          $enableLog = [System.Convert]::ToBoolean('${{ parameters.logRequestResponse }}');

          $failOnly  = [System.Convert]::ToBoolean('${{ parameters.logRequestResponseFailuresOnly }}');

          $extraProps = @();

          if ($enableLog) {
            $extraProps += '-Jjmeter.save.saveservice.output_format=xml';
            if ($failOnly) {
              $extraProps += '-Jjmeter.save.saveservice.response_data.on_error=true';
              $extraProps += '-Jjmeter.save.saveservice.samplerData.on_error=true';
            } else {
              $extraProps += '-Jjmeter.save.saveservice.response_data=true';
              $extraProps += '-Jjmeter.save.saveservice.samplerData=true';
            }
          };

          $jmeterArgs = @(
            "-n",
            "-t", $testPlan,
            "-l", "results\results.jtl",
            "-e", "-o", "report",
            "-Jusers=${{ parameters.users }}",
            "-JrampUp=${{ parameters.rampUp }}",
            "-Jloop=${{ parameters.loop }}",
            "-JgroupToRun=${{ parameters.groupToRun }}",
            "-Jprotocol=https",
            "-Jauth_host=sales.v1130.policysense.solutions",
            "-Jpolicyadmin_host=policyadmin.testview.policysense.solutions",
            "-Jbilling_host=billing.v1130.policysense.solutions",
            "-Jclaims_host=claims.v1130.policysense.solutions",
            "-Jdistribution_host=distributionchannels.v1130.policysense.solutions",
            "-Jsales_host=sales.v1130.policysense.solutions",
            "-Jreinsurance_host=reinsurance.v1130.policysense.solutions",
            "-Jproduct_host=product.v1130.policysense.solutions",
            "-Jusermgmt_host=usermanagement.v1130.policysense.solutions",
            "-Jportal_host=portal.v1130.policysense.solutions",
            "-Jsmc_host=smc.v1130.policysense.solutions",
            "-Jsettings_host=settings.v1130.policysense.solutions"
          ) + $extraProps;

          Write-Host "CMD: $jmeterBat $($jmeterArgs -join ' ')";

          & $jmeterBat @jmeterArgs;

          if ($LASTEXITCODE -ne 0) { Write-Host "##vso[task.logissue type=error]JMeter termino con codigo $LASTEXITCODE"; exit $LASTEXITCODE };

          function Get-StatRows([object]$Root) {
            $acc = [System.Collections.ArrayList]@();
            if ($null -eq $Root) { return @() };
            if ($Root -is [System.Collections.IList] -and $Root -isnot [string]) {
              foreach ($x in $Root) { if ($x) { [void]$acc.Add($x) } };
              return @($acc)
            };
            if ($Root -is [PSCustomObject]) {
              $n = @($Root.PSObject.Properties.Name);
              if (($n -contains 'sampleCount' -or $n -contains 'errorCount') -and $n -contains 'transaction') {
                [void]$acc.Add($Root); return @($acc)
              };
              foreach ($p in $Root.PSObject.Properties) {
                $v = $p.Value;
                if (-not $v -or $v -isnot [PSCustomObject]) { continue };
                $vn = @($v.PSObject.Properties.Name);
                if (-not ($vn -contains 'sampleCount' -or $vn -contains 'errorCount')) { continue };
                if (-not ($vn -contains 'transaction') -or [string]::IsNullOrWhiteSpace("$($v.transaction)")) {
                  $v | Add-Member -NotePropertyName transaction -NotePropertyValue $p.Name -Force
                };
                [void]$acc.Add($v)
              }
            };
            return @($acc)
          };

          function Get-Prop([object]$Row, [string[]]$Keys) {
            if (-not $Row -or $Row -isnot [PSCustomObject]) { return $null };
            foreach ($k in $Keys) {
              foreach ($p in $Row.PSObject.Properties) {
                if ($p.Name -ieq $k) { return $p.Value }
              }
            };
            return $null
          };

          $statsFile = 'report\statistics.json';

          if (-not (Test-Path $statsFile)) {
            Write-Warning "No se encontro $statsFile"
          } else {
            $rows = Get-StatRows (Get-Content $statsFile -Raw | ConvertFrom-Json);
            $hdr  = '{0,-45} {1,8} {2,6} {3,7} {4,8} {5,6} {6,7} {7,8} {8,7} {9,7} {10,7} {11,8}' -f 'Label','#Samples','FAIL','Error%','Avg','Min','Max','Median','p90','p95','p99','TPS';
            $div  = '-' * 120;
            Write-Host ''; Write-Host '=== Metricas JMeter ==='; Write-Host $hdr; Write-Host $div;

            $group = '${{ parameters.groupToRun }}';
            $defaultLimit = [double]${{ parameters.maxErrorPercent }};
            $limitMapJson = '${{ parameters.errorLimitOverridesJson }}'.Trim();

            $globalMax = $defaultLimit;
            try   { $ovr = $limitMapJson | ConvertFrom-Json }
            catch { $ovr = [PSCustomObject]@{} };

            $failed = [System.Collections.ArrayList]@();

            foreach ($r in $rows) {
              $lbl  = [string](Get-Prop $r @('transaction','label'));
              $n    = [int](Get-Prop $r @('sampleCount','samples'));
              $f    = [int](Get-Prop $r @('errorCount','failures'));
              $ep   = if ($n -gt 0) { [math]::Round($f/$n*100,2) } else { 0.0 };
              $avg  = [math]::Round([double](Get-Prop $r @('meanResTime','average')),1);
              $mn   = [int](Get-Prop $r @('minResTime','min'));
              $mx   = [int](Get-Prop $r @('maxResTime','max'));
              $med  = [math]::Round([double](Get-Prop $r @('medianResTime','median')),1);
              $p90  = [int](Get-Prop $r @('pct1ResTime','percentile90'));
              $p95  = [int](Get-Prop $r @('pct2ResTime','percentile95'));
              $p99  = [int](Get-Prop $r @('pct3ResTime','percentile99'));
              $tps  = [math]::Round([double](Get-Prop $r @('throughput','tps')),2);

              Write-Host ('{0,-45} {1,8} {2,6} {3,6:F2}% {4,8} {5,6} {6,7} {7,8} {8,7} {9,7} {10,7} {11,8}' -f $lbl,$n,$f,$ep,$avg,$mn,$mx,$med,$p90,$p95,$p99,$tps);

              $limit = $globalMax;
              $op = $ovr.PSObject.Properties | Where-Object { $_.Name -ieq $lbl };
              if ($op) { $limit = [double]$op.Value };
              if ($ep -gt $limit) { [void]$failed.Add("'$lbl': $ep% > limite $limit%") }
            };
            Write-Host $div; Write-Host '';

            if ($failed.Count -gt 0) {
              foreach ($m in $failed) { Write-Host "##vso[task.logissue type=error]SLA: $m" };
              exit 1
            };
            Write-Host "SLA gate OK: todos los grupos dentro del limite ($globalMax%)"
          }
    - task: PowerShell@2
      displayName: 'HTML en Reports desde statistics.json'
      condition: succeededOrFailed()
      inputs:
        targetType: 'inline'
        script: |
          $statsFile = 'report\statistics.json'
          $outHtml   = 'jmeter-inline-report.html'

          function Get-StatRows([object]$Root) {
            $acc = [System.Collections.ArrayList]@()
            if ($null -eq $Root) { return @() }
            if ($Root -is [System.Collections.IList] -and $Root -isnot [string]) {
              foreach ($x in $Root) { if ($x) { [void]$acc.Add($x) } }
              return @($acc)
            }
            if ($Root -is [PSCustomObject]) {
              $n = @($Root.PSObject.Properties.Name)
              if (($n -contains 'sampleCount' -or $n -contains 'errorCount') -and $n -contains 'transaction') {
                [void]$acc.Add($Root); return @($acc)
              }
              foreach ($p in $Root.PSObject.Properties) {
                $v = $p.Value
                if (-not $v -or $v -isnot [PSCustomObject]) { continue }
                $vn = @($v.PSObject.Properties.Name)
                if (-not ($vn -contains 'sampleCount' -or $vn -contains 'errorCount')) { continue }
                if (-not ($vn -contains 'transaction') -or [string]::IsNullOrWhiteSpace("$($v.transaction)")) {
                  $v | Add-Member -NotePropertyName transaction -NotePropertyValue $p.Name -Force
                }
                [void]$acc.Add($v)
              }
            }
            return @($acc)
          }

          function Get-Prop([object]$Row, [string[]]$Keys) {
            if (-not $Row -or $Row -isnot [PSCustomObject]) { return $null }
            foreach ($k in $Keys) {
              foreach ($p in $Row.PSObject.Properties) {
                if ($p.Name -ieq $k) { return $p.Value }
              }
            }
            return $null
          }

          if (-not (Test-Path $statsFile)) {
            Write-Warning "No se encontro $statsFile — se genera HTML vacio"
            $rows = @()
          } else {
            $rows = Get-StatRows (Get-Content $statsFile -Raw | ConvertFrom-Json)
          }

          $maxErrPct  = [double]'${{ parameters.maxErrorPercent }}'
          $buildId    = '$(Build.BuildId)'
          $groupToRun = '${{ parameters.groupToRun }}'
          $users      = '${{ parameters.users }}'
          $rampUp     = '${{ parameters.rampUp }}'
          $loop       = '${{ parameters.loop }}'

          $tableRows = ''
          foreach ($r in $rows) {
            $lbl = [string](Get-Prop $r @('transaction','label'))
            $n   = [int](Get-Prop $r @('sampleCount','samples'))
            $f   = [int](Get-Prop $r @('errorCount','failures'))
            $ep  = if ($n -gt 0) { [math]::Round($f/$n*100,2) } else { 0.0 }
            $avg = [math]::Round([double](Get-Prop $r @('meanResTime','average')),1)
            $mn  = [int](Get-Prop $r @('minResTime','min'))
            $mx  = [int](Get-Prop $r @('maxResTime','max'))
            $p90 = [int](Get-Prop $r @('pct1ResTime','percentile90'))
            $p95 = [int](Get-Prop $r @('pct2ResTime','percentile95'))
            $p99 = [int](Get-Prop $r @('pct3ResTime','percentile99'))
            $tps = [math]::Round([double](Get-Prop $r @('throughput','tps')),2)
            $cls = if ($ep -gt $maxErrPct) { 'fail' } elseif ($ep -gt 0) { 'warn' } else { 'ok' }
            $tableRows += "<tr class='$cls'><td>$lbl</td><td>$n</td><td>$f</td><td>$ep%</td><td>$avg</td><td>$mn</td><td>$mx</td><td>$p90</td><td>$p95</td><td>$p99</td><td>$tps</td></tr>`n"
          }

          $html = @"
          <!DOCTYPE html><html><head><meta charset='utf-8'>
          <title>JMeter Report - Build $buildId</title>
          <style>
            body{font-family:Segoe UI,Arial,sans-serif;margin:20px;background:#f5f5f5}
            h1{color:#0078d4}
            .meta{background:#fff;padding:12px;border-radius:6px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
            table{width:100%;border-collapse:collapse;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);border-radius:6px;overflow:hidden}
            th{background:#0078d4;color:#fff;padding:10px 8px;text-align:right}
            th:first-child{text-align:left}
            td{padding:8px;border-bottom:1px solid #eee;text-align:right}
            td:first-child{text-align:left}
            tr.ok td{background:#f0fff0}
            tr.warn td{background:#fffde7}
            tr.fail td{background:#ffebee;font-weight:bold}
          </style></head><body>
          <h1>JMeter Load Test Report</h1>
          <div class='meta'>
            <b>Build:</b> $buildId &nbsp;|&nbsp;
            <b>Group:</b> $groupToRun &nbsp;|&nbsp;
            <b>Users:</b> $users &nbsp;|&nbsp;
            <b>RampUp:</b> ${rampUp}s &nbsp;|&nbsp;
            <b>Loop:</b> $loop &nbsp;|&nbsp;
            <b>SLA limit:</b> $maxErrPct%
          </div>
          <table>
          <thead><tr>
            <th>Label</th><th>#Samples</th><th>FAIL</th><th>Error%</th>
            <th>Avg(ms)</th><th>Min</th><th>Max</th><th>p90</th><th>p95</th><th>p99</th><th>TPS</th>
          </tr></thead>
          <tbody>
          $tableRows
          </tbody></table>
          </body></html>
          "@

          $html | Out-File -FilePath $outHtml -Encoding utf8
          Write-Host "Reporte HTML generado: $outHtml"
    - task: PublishHtmlReport@1
      displayName: 'Publicar HTML en pestaña Reports'
      condition: succeededOrFailed()
      inputs:
        reportDir: '$(Build.SourcesDirectory)\jmeter-inline-report.html'
        tabName: 'JMeter (métricas)'
        useFilenameTabs: false
    - task: PowerShell@2
      displayName: 'Crear results.xml'
      condition: succeededOrFailed()
      inputs:
        targetType: 'inline'
        script: |
          $statsFile = 'report\statistics.json'
          $outXml    = 'results.xml'

          function Get-StatRows([object]$Root) {
            $acc = [System.Collections.ArrayList]@()
            if ($null -eq $Root) { return @() }
            if ($Root -is [System.Collections.IList] -and $Root -isnot [string]) {
              foreach ($x in $Root) { if ($x) { [void]$acc.Add($x) } }
              return @($acc)
            }
            if ($Root -is [PSCustomObject]) {
              $n = @($Root.PSObject.Properties.Name)
              if (($n -contains 'sampleCount' -or $n -contains 'errorCount') -and $n -contains 'transaction') {
                [void]$acc.Add($Root); return @($acc)
              }
              foreach ($p in $Root.PSObject.Properties) {
                $v = $p.Value
                if (-not $v -or $v -isnot [PSCustomObject]) { continue }
                $vn = @($v.PSObject.Properties.Name)
                if (-not ($vn -contains 'sampleCount' -or $vn -contains 'errorCount')) { continue }
                if (-not ($vn -contains 'transaction') -or [string]::IsNullOrWhiteSpace("$($v.transaction)")) {
                  $v | Add-Member -NotePropertyName transaction -NotePropertyValue $p.Name -Force
                }
                [void]$acc.Add($v)
              }
            }
            return @($acc)
          }

          function Get-Prop([object]$Row, [string[]]$Keys) {
            if (-not $Row -or $Row -isnot [PSCustomObject]) { return $null }
            foreach ($k in $Keys) {
              foreach ($p in $Row.PSObject.Properties) {
                if ($p.Name -ieq $k) { return $p.Value }
              }
            }
            return $null
          }

          $maxErrPct = [double]'${{ parameters.maxErrorPercent }}'

          if (-not (Test-Path $statsFile)) {
            Write-Warning "No se encontro $statsFile"
            $rows = @()
          } else {
            $rows = Get-StatRows (Get-Content $statsFile -Raw | ConvertFrom-Json)
          }

          $cases = ''
          foreach ($r in $rows) {
            $lbl = [string](Get-Prop $r @('transaction','label'))
            $n   = [int](Get-Prop $r @('sampleCount','samples'))
            $f   = [int](Get-Prop $r @('errorCount','failures'))
            $ep  = if ($n -gt 0) { [math]::Round($f/$n*100,2) } else { 0.0 }
            $avg = [math]::Round([double](Get-Prop $r @('meanResTime','average')),1)
            $lblEsc = [System.Security.SecurityElement]::Escape($lbl)
            if ($ep -gt $maxErrPct) {
              $cases += "    <testcase name='$lblEsc' classname='JMeter' time='$([math]::Round($avg/1000,3))'>`n"
              $cases += "      <failure message='Error rate $ep% exceeds limit $maxErrPct%'>samples=$n failures=$f</failure>`n"
              $cases += "    </testcase>`n"
            } else {
              $cases += "    <testcase name='$lblEsc' classname='JMeter' time='$([math]::Round($avg/1000,3))'/>`n"
            }
          }

          $xml = @"
          <?xml version='1.0' encoding='UTF-8'?>
          <testsuites>
            <testsuite name='JMeter - ${{ parameters.groupToRun }}' tests='$($rows.Count)'>
          $cases
            </testsuite>
          </testsuites>
          "@

          $xml | Out-File -FilePath $outXml -Encoding utf8
          Write-Host "results.xml generado: $outXml"
    - task: PublishTestResults@2
      displayName: 'Publicar resultados JUnit'
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'results.xml'
        failTaskOnFailedTests: false
        testRunTitle: 'JMeter - Policysense - ${{ parameters.groupToRun }}'
    - task: PowerShell@2
      displayName: 'Ver estructura repo'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "Contenido del repo:"
          Get-ChildItem -Recurse
    - task: PublishBuildArtifacts@1
      displayName: 'Publicar reporte HTML completo (artifact)'
      condition: succeededOrFailed()
      inputs:
        PathtoPublish: 'report'
        ArtifactName: 'JMeterReport'
    - task: CmdLine@2
      displayName: 'Verificar reporte'
      condition: succeededOrFailed()
      inputs:
        script: |
          dir report
          dir report\index.html
